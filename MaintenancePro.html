<style>
/* ─── CSS VARIABLES ────────────────────────────────── */
:root {
  --primary: #2563eb;
  --primary-muted: #93b4f8;
  --bg: #dfe3f1;
  --bg-card: #ffffff;
  --bg-input: #f8fafc;
  --bg-hover: #f1f5f9;
  --sidebar-bg: #1e293b;
  --sidebar-border: rgba(255,255,255,0.08);
  --topbar-bg: #ffffff;
  --text: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
  --shadow-lg: 0 10px 25px rgba(0,0,0,0.10), 0 4px 10px rgba(0,0,0,0.06);
  /* Badges */
  --badge-green-bg: #dcfce7; --badge-green-fg: #166534;
  --badge-yellow-bg: #fef9c3; --badge-yellow-fg: #854d0e;
  --badge-red-bg: #fee2e2;   --badge-red-fg: #991b1b;
  --badge-blue-bg: #dbeafe;  --badge-blue-fg: #1e40af;
  --badge-gray-bg: #f1f5f9;  --badge-gray-fg: #475569;
}

[data-theme="dark"] {
  --bg: #0f172a;
  --bg-card: #1e293b;
  --bg-input: #0f172a;
  --bg-hover: #334155;
  --sidebar-bg: #0d1524;
  --sidebar-border: rgba(255,255,255,0.06);
  --topbar-bg: #1e293b;
  --text: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: #334155;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-lg: 0 10px 25px rgba(0,0,0,0.4), 0 4px 10px rgba(0,0,0,0.3);
  --badge-green-bg: #14532d; --badge-green-fg: #86efac;
  --badge-yellow-bg: #422006; --badge-yellow-fg: #fcd34d;
  --badge-red-bg: #450a0a;   --badge-red-fg: #fca5a5;
  --badge-blue-bg: #1e3a5f;  --badge-blue-fg: #93c5fd;
  --badge-gray-bg: #1e293b;  --badge-gray-fg: #94a3b8;
}

/* ─── RESET ────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%; overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

#root { height: 100%; width: 100%; }

/* ─── SCROLLBAR ────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ─── INPUTS ───────────────────────────────────────── */
input, select, textarea {
  font-family: 'Inter', sans-serif;
  color: var(--text);
}
input:focus, select:focus, textarea:focus {
  border-color: var(--primary) !important;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
}

/* ─── SELECTION ────────────────────────────────────── */
::selection { background: var(--primary); color: #fff; }

/* ─── TRANSITIONS ──────────────────────────────────── */
* { transition-property: background-color, border-color, color, opacity;
    transition-duration: 0.12s; transition-timing-function: ease; }
</style>
